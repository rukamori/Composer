name: Build APKs

on:
  workflow_dispatch:
  push:
    branches: [ 'main', 'dev' ]
    paths-ignore:
      - 'README.md'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build Release APK
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          PULL_REQUEST: 'false'
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Resolve release output directory
        id: release_dir
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATES=(
            "app/build/outputs/apk/release"
            "app/build/outputs/apk/app/release"
          )
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ]; then
              echo "release_dir=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          FOUND_METADATA="$(find app/build/outputs/apk -type f -name "output-metadata.json" -path "*/release/output-metadata.json" | head -n 1 || true)"
          if [ -n "${FOUND_METADATA:-}" ]; then
            echo "release_dir=$(dirname "$FOUND_METADATA")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Could not resolve APK release output directory"
          find app/build/outputs/apk -maxdepth 8 -type d -print || true
          exit 1

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: ${{ steps.release_dir.outputs.release_dir }}/
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Move signed APK
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="${{ steps.release_dir.outputs.release_dir }}"
          mkdir -p "$RELEASE_DIR/out"
          SIGNED_APK="$(find "$RELEASE_DIR" -type f \( -name "*-signed.apk" -o -name "*-unsigned-signed.apk" \) | head -n 1)"
          mv "$SIGNED_APK" "$RELEASE_DIR/out/composer-release.apk"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v7
        with:
          name: composer-release
          path: ${{ steps.release_dir.outputs.release_dir }}/out/composer-release.apk

  build_debug:
    name: Build Debug APK
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          PULL_REQUEST: 'false'
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: composer-debug
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/**/debug/*.apk
